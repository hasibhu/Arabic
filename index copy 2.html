<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Letters - বাংলা উচ্চারণ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F5F2;
            min-height: 100vh;
            padding: 32px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(26, 26, 46, 0.03) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: #1A1A2E;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 1.25rem;
            color: #16213E;
            opacity: 0.7;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .progress {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: #16213E;
            background: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .progress span {
            font-weight: 600;
            color: #E94560;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            justify-items: center;
            margin-bottom: 48px;
        }

        @media (min-width: 1100px) {
            .grid {
                grid-template-columns: repeat(4, 300px);
            }
        }

        @media (min-width: 768px) and (max-width: 1099px) {
            .grid {
                grid-template-columns: repeat(3, 300px);
            }
        }

        @media (min-width: 500px) and (max-width: 767px) {
            .grid {
                grid-template-columns: repeat(2, 300px);
            }
        }

        .card-container {
            width: 300px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease-in-out;
        }

        .card-container:hover .card {
            transform: translateY(-8px);
        }

        .card-container.flipped:hover .card {
            transform: translateY(-8px) rotateY(180deg);
        }

        .card-container.flipped .card {
            transform: rotateY(180deg);
        }

        .card-container:hover .card {
            box-shadow: 0 16px 48px rgba(0,0,0,0.12);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            background: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 2px solid #E8E4E0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .card-container.flipped .card-face {
            border-color: #E94560;
        }

        .card-front {
            font-family: 'Amiri', serif;
            font-size: 8rem;
            color: #1A1A2E;
            line-height: 1;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            padding: 16px;
            overflow-y: auto;
        }

        .card-back-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .info-row {
            display: flex;
            gap: 8px;
            font-family: 'Noto Sans Bengali', sans-serif;
            color: white;
        }

        .info-label {
            font-weight: 600;
            white-space: nowrap;
            color: #E94560;
        }

        .info-value {
            color: rgba(255,255,255,0.95);
            line-height: 1.3;
        }

        .info-row.example .info-value {
            direction: ltr;
            text-align: left;
        }

        .hint {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: auto;
            padding-top: 8px;
            text-align: center;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #E94560;
            color: white;
        }

        .btn-primary:hover {
            background: #d63d56;
            transform: scale(1.05);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: white;
            color: #1A1A2E;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: #16213E;
            opacity: 0.5;
            font-size: 0.875rem;
        }

        @media (max-width: 500px) {
            body {
                padding: 16px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .card-container {
                width: 280px;
                height: 280px;
            }

            .card-front {
                font-size: 7rem;
            }

            .info-row {
                font-size: 0.8rem;
            }

            .btn {
                padding: 14px 24px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 501px) and (max-width: 767px) {
            .grid {
                grid-template-columns: repeat(2, 280px);
            }
        }

        @media (min-width: 768px) and (max-width: 1099px) {
            .grid {
                grid-template-columns: repeat(3, 300px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>الحروف العربية</h1>
            <p class="subtitle">আরবি অক্ষর শিখুন - বাংলা উচ্চারণ সহ</p>
        </header>

        <div class="stats-bar">
            <div class="progress">
                দেখা হয়েছে: <span id="viewed">0</span> / <span id="total">29</span>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="actions">
            <button class="btn btn-primary" onclick="resetAll()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                নতুন করে শুরু করুন
            </button>
        </div>

        <footer class="footer">
            আরবি অক্ষর শেখার জন্য ক্লিক করুন
        </footer>
    </div>

    <script>
        const arabicLetters = [
            { 
                arabic: 'ء', 
                name: 'হামযা', 
                pronunciation: 'গলা চেপে আটকানো, গ্লটাল স্টপ শব্দ',
                example: 'أذن (আযুন)', 
                bengali: 'কোনো বাংলা সমতুল্য নেই (ইংরেজি "uh-oh" এর প্রথম অংশ)'
            },
            { 
                arabic: 'ا', 
                name: 'আলিফ', 
                pronunciation: 'দীর্ঘ "আ" ধ্বনি, গলার সামনে থেকে',
                example: 'أب (আব)', 
                bengali: 'দীর্ঘ "আ"'
            },
            { 
                arabic: 'ب', 
                name: 'বা', 
                pronunciation: 'ঠোঁট একে "ব" + স্বর "া"',
                example: 'باب (বাব)', 
                bengali: 'সাধারণ "ব"'
            },
            { 
                arabic: 'ت', 
                name: 'তা', 
                pronunciation: 'জিভ সামনে আনা "ত" + স্বর',
                example: 'بيت (বেইত)', 
                bengali: 'নরম "ত"'
            },
            { 
                arabic: 'ث', 
                name: 'ছা', 
                pronunciation: 'জিভ আগে, "স" এর কাছে "ছ"',
                example: 'ثوب (ছোব)', 
                bengali: '"স" এর মতো "ছ"'
            },
            { 
                arabic: 'ج', 
                name: 'জিম', 
                pronunciation: 'গলার মাঝখান থেকে নরম "জ"',
                example: 'جمل (জমল)', 
                bengali: 'নরম "জ" (ইংরেজি J)'
            },
            { 
                arabic: 'ح', 
                name: 'হা', 
                pronunciation: 'গলার নিচ থেকে শ্বাস的声音, কণ্ঠস্থ',
                example: 'حوت (হোত)', 
                bengali: 'গভীর শ্বাস "হ"'
            },
            { 
                arabic: 'خ', 
                name: 'খা', 
                pronunciation: 'গলার গভীর থেকে ঘষা "খ"',
                example: 'خان (খান)', 
                bengali: 'গভীর "খ" (জার্মান ch)'
            },
            { 
                arabic: 'د', 
                name: 'দাল', 
                pronunciation: 'দাঁতে "দ" চাপ দিয়ে',
                example: 'دفء (দাফউ)', 
                bengali: '"দ" দাঁতে ঠেকিয়ে'
            },
            { 
                arabic: 'ذ', 
                name: 'যাল', 
                pronunciation: 'দাঁতে "য" চাপ, মসৃণ',
                example: 'ذنب (যানব)', 
                bengali: '"জ" এর মতো নরম'
            },
            { 
                arabic: 'ر', 
                name: 'রা', 
                pronunciation: 'জিভ উপরে রেখে "র" টান',
                example: 'رأس (রাআস)', 
                bengali: 'ফ্রেঞ্চ "r" এর মতো'
            },
            { 
                arabic: 'ز', 
                name: 'জাই', 
                pronunciation: 'দাঁতে "জ" ঘষা',
                example: 'زر (জার)', 
                bengali: '"জ" দাঁতে ঠেকিয়ে'
            },
            { 
                arabic: 'س', 
                name: 'সিন', 
                pronunciation: 'দাঁতে "স" ঘষা',
                example: 'سماء (সামাআ)', 
                bengali: 'সাধারণ "স"'
            },
            { 
                arabic: 'ش', 
                name: 'শিন', 
                pronunciation: '"শ" দাঁতে ঘষা, ঠোঁট গোল',
                example: 'شمس (শামস)', 
                bengali: 'ইংরেজি "sh"'
            },
            { 
                arabic: 'ص', 
                name: 'সোয়াদ', 
                pronunciation: 'গলার গভীর থেকে "স", ভারী',
                example: 'صبي (সাবি)', 
                bengali: 'গভীর ঘষা "স"'
            },
            { 
                arabic: 'ض', 
                name: 'দোয়াদ', 
                pronunciation: 'গলার গভীর থেকে "দ", ভারী',
                example: 'ضوء (দোউ)', 
                bengali: 'গভীর "দ"'
            },
            { 
                arabic: 'ط', 
                name: 'তা', 
                pronunciation: 'গলার গভীর থেকে "ত", ভারী',
                example: 'طين (তীন)', 
                bengali: 'গভীর ঠোঁট "ত"'
            },
            { 
                arabic: 'ظ', 
                name: 'যা', 
                pronunciation: 'গলার গভীর থেকে "য", ভারী',
                example: 'ظهر (যুহর)', 
                bengali: 'গভীর নরম "য"'
            },
            { 
                arabic: 'ع', 
                name: 'আইন', 
                pronunciation: 'গলার মাঝখানে আটকানো, ঘন্টির মতো',
                example: 'عين (আইন)', 
                bengali: 'গলা চেপে "আ"'
            },
            { 
                arabic: 'غ', 
                name: 'গইন', 
                pronunciation: 'গলার গভীর থেকে "গ", ঘষা',
                example: 'غلام (গুলাম)', 
                bengali: 'ফরাসি "r" এর মতো'
            },
            { 
                arabic: 'ف', 
                name: 'ফা', 
                pronunciation: 'ঠোঁটে "ফ" স্পর্শ',
                example: 'فم (ফাম)', 
                bengali: 'ইংরেজি "f"'
            },
            { 
                arabic: 'ق', 
                name: 'ক্বাফ', 
                pronunciation: 'গলার গভীর থেকে, "ক্ব" বা শক্ত "ক"',
                example: 'قرآن (কুরআন)', 
                bengali: '"ক্ব" (খুব জোরে, গলার ভিতর থেকে)'
            },
            { 
                arabic: 'ك', 
                name: 'কাফ', 
                pronunciation: 'সাধারণ "ক", গলার পেছনে',
                example: 'كتاب (কিতাব)', 
                bengali: '"ক"'
            },
            { 
                arabic: 'ل', 
                name: 'লাম', 
                pronunciation: 'জিভ মুখের উপরে রেখে "ল"',
                example: 'لبن (লাবন)', 
                bengali: 'সাধারণ "ল"'
            },
            { 
                arabic: 'م', 
                name: 'মিম', 
                pronunciation: 'ঠোঁট বন্ধ করে "ম"',
                example: 'ماء (মাআ)', 
                bengali: 'সাধারণ "ম"'
            },
            { 
                arabic: 'ن', 
                name: 'নূন', 
                pronunciation: 'জিভ দাঁতে ঠেকিয়ে "ন"',
                example: 'نهر (নাহর)', 
                bengali: 'সাধারণ "ন"'
            },
            { 
                arabic: 'هـ', 
                name: 'হা', 
                pronunciation: 'গলার শেষ থেকে শ্বাস "হ"',
                example: 'هدف (হাদফ)', 
                bengali: 'শ্বাস "হ"'
            },
            { 
                arabic: 'و', 
                name: 'ওয়াও', 
                pronunciation: 'ঠোঁট গোল করে "ও" বা "উ"',
                example: 'ولد (ওয়ালদ)', 
                bengali: '"ও" বা "উ"'
            },
            { 
                arabic: 'ي', 
                name: 'য়া', 
                pronunciation: 'জিভ উপরে তুলে "ই" থেকে "য়"',
                example: 'يد (য়াদ)', 
                bengali: '"য়" বা দীর্ঘ "ই"'
            }
        ];

        let viewedCount = 0;
        let shuffledLetters = [];

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function createCard(letter, index) {
            const card = document.createElement('div');
            card.className = 'card-container';
            card.style.animationDelay = `${index * 50}ms`;
            
            card.innerHTML = `
                <div class="card">
                    <div class="card-face card-front">${letter.arabic}</div>
                    <div class="card-face card-back">
                        <div class="card-back-content">
                            <div class="info-row">
                                <span class="info-label">নাম:</span>
                                <span class="info-value">${letter.name}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">উচ্চারণ:</span>
                                <span class="info-value">${letter.pronunciation}</span>
                            </div>
                            <div class="info-row example">
                                <span class="info-label">উদাহরণ:</span>
                                <span class="info-value">${letter.example}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">বাংলা কাছাকাছি:</span>
                                <span class="info-value">${letter.bengali}</span>
                            </div>
                        </div>
                        // <div class="hint">উচ্চারণ</div>
                    </div>
                </div>
            `;
            
            card.addEventListener('click', () => flipCard(card));
            return card;
        }

        function flipCard(card) {
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
            } else {
                card.classList.add('flipped');
                if (!card.dataset.viewed) {
                    card.dataset.viewed = 'true';
                    viewedCount++;
                    updateProgress();
                }
            }
        }

        function updateProgress() {
            document.getElementById('viewed').textContent = viewedCount;
        }

        function resetAll() {
            viewedCount = 0;
            updateProgress();
            shuffledLetters = shuffle(arabicLetters);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            shuffledLetters.forEach((letter, index) => {
                grid.appendChild(createCard(letter, index));
            });
        }

        resetAll();
    </script>
</body>
</html>
