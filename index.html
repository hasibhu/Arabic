<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Letters - বাংলা উচ্চারণ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F5F2;
            min-height: 100vh;
            padding: 32px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(26, 26, 46, 0.03) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: #1A1A2E;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 1.25rem;
            color: #16213E;
            opacity: 0.7;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .progress {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: #16213E;
            background: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .progress span {
            font-weight: 600;
            color: #E94560;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            justify-items: center;
            margin-bottom: 48px;
        }

        @media (min-width: 1100px) {
            .grid {
                grid-template-columns: repeat(4, 300px);
            }
        }

        @media (min-width: 768px) and (max-width: 1099px) {
            .grid {
                grid-template-columns: repeat(3, 300px);
            }
        }

        @media (min-width: 500px) and (max-width: 767px) {
            .grid {
                grid-template-columns: repeat(2, 300px);
            }
        }

        .card-container {
            width: 300px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease-in-out;
        }

        .card-container:hover .card {
            transform: translateY(-8px);
        }

        .card-container.flipped:hover .card {
            transform: translateY(-8px) rotateY(180deg);
        }

        .card-container.flipped .card {
            transform: rotateY(180deg);
        }

        .card-container:hover .card {
            box-shadow: 0 16px 48px rgba(0,0,0,0.12);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            background: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 2px solid #E8E4E0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .card-container.flipped .card-face {
            border-color: #E94560;
        }

        .card-front {
            font-family: 'Amiri', serif;
            font-size: 8rem;
            color: #1A1A2E;
            line-height: 1;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            padding: 16px;
            overflow-y: auto;
        }

        .card-back-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .info-row {
            display: flex;
            gap: 8px;
            font-family: 'Noto Sans Bengali', sans-serif;
            color: white;
        }

        .info-label {
            font-weight: 600;
            white-space: nowrap;
            color: #E94560;
        }

        .info-value {
            color: rgba(255,255,255,0.95);
            line-height: 1.3;
        }

        .info-row.example .info-value {
            direction: ltr;
            text-align: left;
        }

        .hint {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: auto;
            padding-top: 8px;
            text-align: center;
        }

        .harakat-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 6px 12px;
            background: rgba(233, 69, 96, 0.9);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .harakat-btn:hover {
            background: #E94560;
            transform: scale(1.05);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeInOverlay 0.2s ease-out;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #666;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #e0e0e0;
            color: #333;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #E8E4E0;
        }

        .modal-letter {
            font-family: 'Amiri', serif;
            font-size: 4rem;
            color: #1A1A2E;
            line-height: 1;
        }

        .modal-letter-name {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #16213E;
            margin-top: 8px;
        }

        .harakat-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .harakat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #F7F5F2;
            border-radius: 10px;
        }

        .harakat-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .harakat-name {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #E94560;
        }

        .harakat-arabic {
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            color: #1A1A2E;
            direction: ltr;
        }

        .harakat-sound {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 0.95rem;
            color: #16213E;
            direction: ltr;
            text-align: right;
        }

        .modal-title {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 1rem;
            color: #666;
            margin-bottom: 4px;
        }

        .full-table-modal .modal-content {
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .full-table-title {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1A1A2E;
            text-align: center;
            margin-bottom: 20px;
        }

        .harakat-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Noto Sans Bengali', sans-serif;
        }

        .harakat-table th {
            background: #1A1A2E;
            color: white;
            padding: 12px 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .harakat-table th:first-child {
            border-radius: 8px 0 0 8px;
        }

        .harakat-table th:last-child {
            border-radius: 0 8px 8px 0;
        }

        .harakat-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #E8E4E0;
            font-size: 0.95rem;
        }

        .harakat-table tr:nth-child(even) {
            background: #F7F5F2;
        }

        .harakat-table tr:hover {
            background: #EDE9E3;
        }

        .harakat-table .letter-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .harakat-table .arabic-char {
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            color: #1A1A2E;
        }

        .harakat-table .bengali-name {
            font-size: 0.75rem;
            color: #666;
        }

        .harakat-table .sound-cell {
            font-family: 'Noto Sans Bengali', sans-serif;
        }

        .harakat-table .sound-cell .arabic {
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            color: #1A1A2E;
            direction: ltr;
            display: block;
        }

        .harakat-table .sound-cell .bengali {
            font-size: 0.85rem;
            color: #16213E;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #E94560;
            color: white;
        }

        .btn-primary:hover {
            background: #d63d56;
            transform: scale(1.05);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: white;
            color: #1A1A2E;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: #16213E;
            opacity: 0.5;
            font-size: 0.875rem;
        }

        @media (max-width: 500px) {
            body {
                padding: 16px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .card-container {
                width: 280px;
                height: 280px;
            }

            .card-front {
                font-size: 7rem;
            }

            .info-row {
                font-size: 0.8rem;
            }

            .btn {
                padding: 14px 24px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 501px) and (max-width: 767px) {
            .grid {
                grid-template-columns: repeat(2, 280px);
            }
        }

        @media (min-width: 768px) and (max-width: 1099px) {
            .grid {
                grid-template-columns: repeat(3, 300px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="subtitle">আরবি অক্ষর শিখুন - বাংলা উচ্চারণ সহ</p>
        </header>

        <div class="stats-bar">
            <div class="progress">
                দেখা হয়েছে: <span id="viewed">0</span> / <span id="total">29</span>
            </div>
            <button class="btn btn-secondary" onclick="openFullTable()">
                📋 সম্পূর্ণ সারণি
            </button>
        </div>

        <div class="grid" id="grid"></div>

        <div class="actions">
            <button class="btn btn-primary" onclick="resetAll()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                নতুন করে শুরু করুন
            </button>
        </div>

        <footer class="footer">
            Hasib, Humboldt University of Berlin, Germany
        </footer>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-header">
                <div class="modal-letter" id="modal-letter"></div>
                <div class="modal-letter-name" id="modal-letter-name"></div>
            </div>
            <div class="modal-title">হরকাত (Harakat)</div>
            <div class="harakat-list" id="harakat-list"></div>
        </div>
    </div>

    <div class="modal-overlay full-table-modal" id="fullTableModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeFullTable()">✕</button>
            <div class="full-table-title">আরবি অক্ষরের হরকাত সারণি</div>
            <table class="harakat-table" id="harakatTable">
                <thead>
                    <tr>
                        <th>অক্ষর</th>
                        <th>জবর (া)</th>
                        <th>জের (ি)</th>
                        <th>পেশ (ু)</th>
                    </tr>
                </thead>
                <tbody id="harakatTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const arabicLetters = [
            { 
                arabic: 'ء', 
                name: 'হামযা', 
                pronunciation: 'গলা চেপে আটকানো, গ্লটাল স্টপ শব্দ',
                example: 'أذن (আযুন)', 
                bengali: 'কোনো বাংলা সমতুল্য নেই',
                fatha: 'أَ', fathaBn: 'আ',
                kasra: 'أِ', kasraBn: 'ই',
                damma: 'أُ', dammaBn: 'উ'
            },
            { 
                arabic: 'ا', 
                name: 'আলিফ', 
                pronunciation: 'দীর্ঘ "আ" ধ্বনি, গলার সামনে থেকে',
                example: 'أب (আব)', 
                bengali: 'দীর্ঘ "আ"',
                fatha: 'اَ', fathaBn: 'আ',
                kasra: 'اِ', kasraBn: 'ই',
                damma: 'اُ', dammaBn: 'উ'
            },
            { 
                arabic: 'ب', 
                name: 'বা', 
                pronunciation: 'ঠোঁট একে "ব" + স্বর "া"',
                example: 'باب (বাব)', 
                bengali: 'সাধারণ "ব"',
                fatha: 'بَ', fathaBn: 'বা',
                kasra: 'بِ', kasraBn: 'বি',
                damma: 'بُ', dammaBn: 'বু'
            },
            { 
                arabic: 'ت', 
                name: 'তা', 
                pronunciation: 'জিভ সামনে আনা "ত" + স্বর',
                example: 'بيت (বেইত)', 
                bengali: 'নরম "ত"',
                fatha: 'تَ', fathaBn: 'তা',
                kasra: 'تِ', kasraBn: 'তি',
                damma: 'تُ', dammaBn: 'তু'
            },
            { 
                arabic: 'ث', 
                name: 'সা/ছা', 
                pronunciation: 'জিভ আগে, "স" এর কাছে "ছ"',
                example: 'ثوب (ছোব)', 
                bengali: '"স" এর মতো "ছ"',
                fatha: 'ثَ', fathaBn: 'সা',
                kasra: 'ثِ', kasraBn: 'সি',
                damma: 'ثُ', dammaBn: 'সু'
            },
            { 
                arabic: 'ج', 
                name: 'জিম', 
                pronunciation: 'গলার মাঝখান থেকে নরম "জ"',
                example: 'جمل (জমল)', 
                bengali: 'নরম "জ" (ইংরেজি J)',
                fatha: 'جَ', fathaBn: 'জা',
                kasra: 'جِ', kasraBn: 'জি',
                damma: 'جُ', dammaBn: 'জু'
            },
            { 
                arabic: 'ح', 
                name: 'হা', 
                pronunciation: 'গলার নিচ থেকে শ্বাস, কণ্ঠস্থ',
                example: 'حوت (হোত)', 
                bengali: 'গভীর শ্বাস "হ"',
                fatha: 'حَ', fathaBn: 'হা',
                kasra: 'حِ', kasraBn: 'হি',
                damma: 'حُ', dammaBn: 'হু'
            },
            { 
                arabic: 'خ', 
                name: 'খা', 
                pronunciation: 'গলার গভীর থেকে ঘষা "খ"',
                example: 'خان (খান)', 
                bengali: 'গভীর "খ" (জার্মান ch)',
                fatha: 'خَ', fathaBn: 'খা',
                kasra: 'خِ', kasraBn: 'খি',
                damma: 'خُ', dammaBn: 'খু'
            },
            { 
                arabic: 'د', 
                name: 'দাল', 
                pronunciation: 'দাঁতে "দ" চাপ দিয়ে',
                example: 'دفء (দাফউ)', 
                bengali: '"দ" দাঁতে ঠেকিয়ে',
                fatha: 'دَ', fathaBn: 'দা',
                kasra: 'دِ', kasraBn: 'দি',
                damma: 'دُ', dammaBn: 'দু'
            },
            { 
                arabic: 'ذ', 
                name: 'যাল', 
                pronunciation: 'দাঁতে "য" চাপ, মসৃণ',
                example: 'ذنب (যানব)', 
                bengali: '"জ" এর মতো নরম',
                fatha: 'ذَ', fathaBn: 'যা',
                kasra: 'ذِ', kasraBn: 'যি',
                damma: 'ذُ', dammaBn: 'যু'
            },
            { 
                arabic: 'ر', 
                name: 'রা', 
                pronunciation: 'জিভ উপরে রেখে "র" টান',
                example: 'رأس (রাআস)', 
                bengali: 'ফ্রেঞ্চ "r" এর মতো',
                fatha: 'رَ', fathaBn: 'রা',
                kasra: 'رِ', kasraBn: 'রি',
                damma: 'رُ', dammaBn: 'রু'
            },
            { 
                arabic: 'ز', 
                name: 'জাই', 
                pronunciation: 'দাঁতে "জ" ঘষা',
                example: 'زر (জার)', 
                bengali: '"জ" দাঁতে ঠেকিয়ে',
                fatha: 'زَ', fathaBn: 'যা',
                kasra: 'زِ', kasraBn: 'জি',
                damma: 'زُ', dammaBn: 'জু'
            },
            { 
                arabic: 'س', 
                name: 'সিন', 
                pronunciation: 'দাঁতে "স" ঘষা',
                example: 'سماء (সামাআ)', 
                bengali: 'সাধারণ "স"',
                fatha: 'سَ', fathaBn: 'সা',
                kasra: 'سِ', kasraBn: 'সি',
                damma: 'سُ', dammaBn: 'সু'
            },
            { 
                arabic: 'ش', 
                name: 'শিন', 
                pronunciation: '"শ" দাঁতে ঘষা, ঠোঁট গোল',
                example: 'شمس (শামস)', 
                bengali: 'ইংরেজি "sh"',
                fatha: 'شَ', fathaBn: 'শা',
                kasra: 'شِ', kasraBn: 'শি',
                damma: 'شُ', dammaBn: 'শু'
            },
            { 
                arabic: 'ص', 
                name: 'সাদ', 
                pronunciation: 'গলার গভীর থেকে "স", ভারী',
                example: 'صبي (সাবি)', 
                bengali: 'গভীর ঘষা "স"',
                fatha: 'صَ', fathaBn: 'সা',
                kasra: 'صِ', kasraBn: 'সি',
                damma: 'صُ', dammaBn: 'সু'
            },
            { 
                arabic: 'ض', 
                name: 'দাদ', 
                pronunciation: 'গলার গভীর থেকে "দ", ভারী',
                example: 'ضوء (দোউ)', 
                bengali: 'গভীর "দ"',
                fatha: 'ضَ', fathaBn: 'দা',
                kasra: 'ضِ', kasraBn: 'দি',
                damma: 'ضُ', dammaBn: 'দু'
            },
            { 
                arabic: 'ط', 
                name: 'তা', 
                pronunciation: 'গলার গভীর থেকে "ত", ভারী',
                example: 'طين (তীন)', 
                bengali: 'গভীর ঠোঁট "ত"',
                fatha: 'طَ', fathaBn: 'তা',
                kasra: 'طِ', kasraBn: 'তি',
                damma: 'طُ', dammaBn: 'তু'
            },
            { 
                arabic: 'ظ', 
                name: 'যা', 
                pronunciation: 'গলার গভীর থেকে "য", ভারী',
                example: 'ظهر (যুহর)', 
                bengali: 'গভীর নরম "য"',
                fatha: 'ظَ', fathaBn: 'যা',
                kasra: 'ظِ', kasraBn: 'যি',
                damma: 'ظُ', dammaBn: 'যু'
            },
            { 
                arabic: 'ع', 
                name: 'আইন', 
                pronunciation: 'গলার মাঝখানে আটকানো, ঘন্টির মতো',
                example: 'عين (আইন)', 
                bengali: 'গলা চেপে "আ"',
                fatha: 'عَ', fathaBn: 'আ',
                kasra: 'عِ', kasraBn: 'ই',
                damma: 'عُ', dammaBn: 'উ'
            },
            { 
                arabic: 'غ', 
                name: 'গইন', 
                pronunciation: 'গলার গভীর থেকে "গ", ঘষা',
                example: 'غلام (গুলাম)', 
                bengali: 'ফরাসি "r" এর মতো',
                fatha: 'غَ', fathaBn: 'গা',
                kasra: 'غِ', kasraBn: 'গি',
                damma: 'غُ', dammaBn: 'গু'
            },
            { 
                arabic: 'ف', 
                name: 'ফা', 
                pronunciation: 'ঠোঁটে "ফ" স্পর্শ',
                example: 'فم (ফাম)', 
                bengali: 'ইংরেজি "f"',
                fatha: 'فَ', fathaBn: 'ফা',
                kasra: 'فِ', kasraBn: 'ফি',
                damma: 'فُ', dammaBn: 'ফু'
            },
            { 
                arabic: 'ق', 
                name: 'ক্বাফ', 
                pronunciation: 'গলার গভীর থেকে, "ক্ব" বা শক্ত "ক"',
                example: 'قرآن (কুরআন)', 
                bengali: '"ক্ব" (খুব জোরে, গলার ভিতর থেকে)',
                fatha: 'قَ', fathaBn: 'ক্বা',
                kasra: 'قِ', kasraBn: 'ক্বি',
                damma: 'قُ', dammaBn: 'ক্বু'
            },
            { 
                arabic: 'ك', 
                name: 'কাফ', 
                pronunciation: 'সাধারণ "ক", গলার পেছনে',
                example: 'كتاب (কিতাব)', 
                bengali: '"ক"',
                fatha: 'كَ', fathaBn: 'কা',
                kasra: 'كِ', kasraBn: 'কি',
                damma: 'كُ', dammaBn: 'কু'
            },
            { 
                arabic: 'ل', 
                name: 'লাম', 
                pronunciation: 'জিভ মুখের উপরে রেখে "ল"',
                example: 'لبن (লাবন)', 
                bengali: 'সাধারণ "ল"',
                fatha: 'لَ', fathaBn: 'লা',
                kasra: 'لِ', kasraBn: 'লি',
                damma: 'لُ', dammaBn: 'লু'
            },
            { 
                arabic: 'م', 
                name: 'মিম', 
                pronunciation: 'ঠোঁট বন্ধ করে "ম"',
                example: 'ماء (মাআ)', 
                bengali: 'সাধারণ "ম"',
                fatha: 'مَ', fathaBn: 'মা',
                kasra: 'مِ', kasraBn: 'মি',
                damma: 'مُ', dammaBn: 'মু'
            },
            { 
                arabic: 'ن', 
                name: 'নূন', 
                pronunciation: 'জিভ দাঁতে ঠেকিয়ে "ন"',
                example: 'نهر (নাহর)', 
                bengali: 'সাধারণ "ন"',
                fatha: 'نَ', fathaBn: 'না',
                kasra: 'نِ', kasraBn: 'নি',
                damma: 'نُ', dammaBn: 'নু'
            },
            { 
                arabic: 'هـ', 
                name: 'হা', 
                pronunciation: 'গলার শেষ থেকে শ্বাস "হ"',
                example: 'هدف (হাদফ)', 
                bengali: 'শ্বাস "হ"',
                fatha: 'هَ', fathaBn: 'হা',
                kasra: 'هِ', kasraBn: 'হি',
                damma: 'هُ', dammaBn: 'হু'
            },
            { 
                arabic: 'و', 
                name: 'ওয়াও', 
                pronunciation: 'ঠোঁট গোল করে "ও" বা "উ"',
                example: 'ولد (ওয়ালদ)', 
                bengali: '"ও" বা "উ"',
                fatha: 'وَ', fathaBn: 'ওয়া',
                kasra: 'وِ', kasraBn: 'উই',
                damma: 'وُ', dammaBn: 'উ'
            },
            { 
                arabic: 'ي', 
                name: 'য়া', 
                pronunciation: 'জিভ উপরে তুলে "ই" থেকে "য়"',
                example: 'يد (য়াদ)', 
                bengali: '"য়" বা দীর্ঘ "ই"',
                fatha: 'يَ', fathaBn: 'যা',
                kasra: 'يِ', kasraBn: 'ই',
                damma: 'يُ', dammaBn: 'ইউ'
            }
        ];

        let viewedCount = 0;
        let shuffledLetters = [];

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function createCard(letter, index) {
            const card = document.createElement('div');
            card.className = 'card-container';
            card.style.animationDelay = `${index * 50}ms`;
            
            card.innerHTML = `
                <div class="card">
                    <div class="card-face card-front">${letter.arabic}</div>
                    <div class="card-face card-back">
                        <div class="card-back-content">
                            <div class="info-row">
                                <span class="info-label">নাম:</span>
                                <span class="info-value">${letter.name}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">উচ্চারণ:</span>
                                <span class="info-value">${letter.pronunciation}</span>
                            </div>
                            <div class="info-row example">
                                <span class="info-label">উদাহরণ:</span>
                                <span class="info-value">${letter.example}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">বাংলা কাছাকাছি:</span>
                                <span class="info-value">${letter.bengali}</span>
                            </div>
                        </div>
                        <button class="harakat-btn" onclick="event.stopPropagation(); openModal('${letter.arabic}')">হরকাত</button>
                        <div class="hint"></div>
                    </div>
                </div>
            `;
            
            card.addEventListener('click', () => flipCard(card));
            return card;
        }

        function flipCard(card) {
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
            } else {
                card.classList.add('flipped');
                if (!card.dataset.viewed) {
                    card.dataset.viewed = 'true';
                    viewedCount++;
                    updateProgress();
                }
            }
        }

        function updateProgress() {
            document.getElementById('viewed').textContent = viewedCount;
        }

        function getHarakatData(arabic) {
            const letter = arabicLetters.find(l => l.arabic === arabic);
            if (!letter) return null;
            
            return {
                letter: arabic,
                name: letter.name,
                fatha: { arabic: letter.fatha, sound: letter.fathaBn },
                kasra: { arabic: letter.kasra, sound: letter.kasraBn },
                damma: { arabic: letter.damma, sound: letter.dammaBn }
            };
        }

        function openModal(arabic) {
            const data = getHarakatData(arabic);
            if (!data) return;
            
            document.getElementById('modal-letter').textContent = data.letter;
            document.getElementById('modal-letter-name').textContent = data.name;
            
            const list = document.getElementById('harakat-list');
            list.innerHTML = `
                <div class="harakat-item">
                    <div class="harakat-info">
                        <span class="harakat-name">জবর (a)</span>
                        <span class="harakat-arabic">${data.fatha.arabic}</span>
                    </div>
                    <span class="harakat-sound">${data.fatha.sound}</span>
                </div>
                <div class="harakat-item">
                    <div class="harakat-info">
                        <span class="harakat-name">জের (i)</span>
                        <span class="harakat-arabic">${data.kasra.arabic}</span>
                    </div>
                    <span class="harakat-sound">${data.kasra.sound}</span>
                </div>
                <div class="harakat-item">
                    <div class="harakat-info">
                        <span class="harakat-name">পেশ (u)</span>
                        <span class="harakat-arabic">${data.damma.arabic}</span>
                    </div>
                    <span class="harakat-sound">${data.damma.sound}</span>
                </div>
            `;
            
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                closeFullTable();
            }
        });

        function openFullTable() {
            const tbody = document.getElementById('harakatTableBody');
            tbody.innerHTML = '';
            
            arabicLetters.forEach(letter => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="letter-cell">
                            <span class="arabic-char">${letter.arabic}</span>
                            <span class="bengali-name">${letter.name}</span>
                        </div>
                    </td>
                    <td class="sound-cell">
                        <span class="arabic">${letter.fatha}</span>
                        <span class="bengali">${letter.fathaBn}</span>
                    </td>
                    <td class="sound-cell">
                        <span class="arabic">${letter.kasra}</span>
                        <span class="bengali">${letter.kasraBn}</span>
                    </td>
                    <td class="sound-cell">
                        <span class="arabic">${letter.damma}</span>
                        <span class="bengali">${letter.dammaBn}</span>
                    </td>
                `;
                tbody.appendChild(row);
            });
            
            document.getElementById('fullTableModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeFullTable() {
            document.getElementById('fullTableModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('fullTableModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFullTable();
            }
        });

        function resetAll() {
            viewedCount = 0;
            updateProgress();
            shuffledLetters = shuffle(arabicLetters);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            shuffledLetters.forEach((letter, index) => {
                grid.appendChild(createCard(letter, index));
            });
        }

        resetAll();
    </script>
</body>
</html>
