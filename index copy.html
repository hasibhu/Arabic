<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Letters - বাংলা উচ্চারণ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F7F5F2;
            min-height: 100vh;
            padding: 32px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(233, 69, 96, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(26, 26, 46, 0.03) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: #1A1A2E;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 1.25rem;
            color: #16213E;
            opacity: 0.7;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .progress {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: #16213E;
            background: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .progress span {
            font-weight: 600;
            color: #E94560;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            justify-items: center;
            margin-bottom: 48px;
        }

        @media (min-width: 1100px) {
            .grid {
                grid-template-columns: repeat(4, 300px);
            }
        }

        @media (min-width: 768px) and (max-width: 1099px) {
            .grid {
                grid-template-columns: repeat(3, 300px);
            }
        }

        @media (min-width: 500px) and (max-width: 767px) {
            .grid {
                grid-template-columns: repeat(2, 300px);
            }
        }

        .card-container {
            width: 300px;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease-in-out;
        }

        .card-container:hover .card {
            transform: translateY(-8px) rotateY(0deg);
        }

        .card-container.flipped:hover .card {
            transform: translateY(-8px) rotateY(180deg);
        }

        .card-container.flipped .card {
            transform: rotateY(180deg);
        }

        .card-container:hover .card {
            box-shadow: 0 16px 48px rgba(0,0,0,0.12);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            background: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 2px solid #E8E4E0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .card-container.flipped .card-face {
            border-color: #E94560;
        }

        .card-front {
            font-family: 'Amiri', serif;
            font-size: 8rem;
            color: #1A1A2E;
            line-height: 1;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
        }

        .bengali-text {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: white;
            text-align: center;
            padding: 16px;
        }

        .hint {
            font-family: 'Noto Sans Bengali', sans-serif;
            font-size: 0.875rem;
            color: rgba(255,255,255,0.6);
            margin-top: 16px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            padding: 16px 32px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #E94560;
            color: white;
        }

        .btn-primary:hover {
            background: #d63d56;
            transform: scale(1.05);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: white;
            color: #1A1A2E;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .btn-secondary:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            padding: 24px;
            color: #16213E;
            opacity: 0.5;
            font-size: 0.875rem;
        }

        @media (max-width: 500px) {
            body {
                padding: 16px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .card-container {
                width: 280px;
                height: 280px;
            }

            .card-front {
                font-size: 7rem;
            }

            .bengali-text {
                font-size: 2rem;
            }

            .btn {
                padding: 14px 24px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 501px) and (max-width: 767px) {
            .grid {
                grid-template-columns: repeat(2, 280px);
            }
        }

        @media (min-width: 768px) and (max-width: 1099px) {
            .grid {
                grid-template-columns: repeat(3, 300px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>الحروف العربية</h1>
            <p class="subtitle">আরবি অক্ষর শিখুন - বাংলা উচ্চারণ সহ</p>
        </header>

        <div class="stats-bar">
            <div class="progress">
                দেখা হয়েছে: <span id="viewed">0</span> / <span id="total">28</span>
            </div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="actions">
            <button class="btn btn-primary" onclick="resetAll()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                নতুন করে শুরু করুন
            </button>
        </div>

        <footer class="footer">
            আরবি অক্ষর শেখার জন্য ক্লিক করুন
        </footer>
    </div>

    <script>
        const arabicLetters = [
            { arabic: 'ا', bengali: 'আলিফ' },
            { arabic: 'ب', bengali: 'বা' },
            { arabic: 'ت', bengali: 'তা' },
            { arabic: 'ث', bengali: 'ছা' },
            { arabic: 'ج', bengali: 'জিম' },
            { arabic: 'ح', bengali: 'হা' },
            { arabic: 'خ', bengali: 'খা' },
            { arabic: 'د', bengali: 'দাল' },
            { arabic: 'ذ', bengali: 'যাল' },
            { arabic: 'ر', bengali: 'রা' },
            { arabic: 'ز', bengali: 'জাই' },
            { arabic: 'س', bengali: 'সিন' },
            { arabic: 'ش', bengali: 'শিন' },
            { arabic: 'ص', bengali: 'সাদ' },
            { arabic: 'ض', bengali: 'দাদ' },
            { arabic: 'ط', bengali: 'তা' },
            { arabic: 'ظ', bengali: 'যা' },
            { arabic: 'ع', bengali: 'আইন' },
            { arabic: 'غ', bengali: 'গাইন' },
            { arabic: 'ف', bengali: 'ফা' },
            { arabic: 'ق', bengali: 'কাফ' },
            { arabic: 'ك', bengali: 'কাফ' },
            { arabic: 'ل', bengali: 'লাম' },
            { arabic: 'م', bengali: 'মিম' },
            { arabic: 'ن', bengali: 'নূন' },
            { arabic: 'هـ', bengali: 'হা' },
            { arabic: 'و', bengali: 'ওয়াও' },
            { arabic: 'ي', bengali: 'য়া' }
        ];

        let viewedCount = 0;
        let shuffledLetters = [];

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function createCard(letter, index) {
            const card = document.createElement('div');
            card.className = 'card-container';
            card.style.animationDelay = `${index * 50}ms`;
            
            card.innerHTML = `
                <div class="card">
                    <div class="card-face card-front">${letter.arabic}</div>
                    <div class="card-face card-back">
                        <div class="bengali-text">${letter.bengali}</div>
                        <div class="hint">উচ্চারণ</div>
                    </div>
                </div>
            `;
            
            card.addEventListener('click', () => flipCard(card));
            return card;
        }

        function flipCard(card) {
            if (card.classList.contains('flipped')) {
                card.classList.remove('flipped');
            } else {
                card.classList.add('flipped');
                if (!card.dataset.viewed) {
                    card.dataset.viewed = 'true';
                    viewedCount++;
                    updateProgress();
                }
            }
        }

        function updateProgress() {
            document.getElementById('viewed').textContent = viewedCount;
        }

        function resetAll() {
            viewedCount = 0;
            updateProgress();
            shuffledLetters = shuffle(arabicLetters);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            shuffledLetters.forEach((letter, index) => {
                grid.appendChild(createCard(letter, index));
            });
        }

        resetAll();
    </script>
</body>
</html>
